[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect /api/* to the backend (set NEXT_PUBLIC_API_URL in Netlify env vars)
# Netlify rewrites are handled by next.config.js rewrites() using NEXT_PUBLIC_API_URL

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "production"
