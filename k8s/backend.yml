apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-backend
  namespace: school-sms
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sms-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sms-backend
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '5000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
        - name: backend
          image: your-registry/sms-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: sms-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '5000'
            - name: FRONTEND_URL
              value: 'https://yourdomain.com'
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: school-sms
spec:
  selector:
    app: sms-backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sms-backend-hpa
  namespace: school-sms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sms-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
