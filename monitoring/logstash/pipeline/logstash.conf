input {
  file {
    path => "/logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
  # Also accept Beats input from filebeat / app-direct shipping
  beats {
    port => 5044
  }
}

filter {
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    add_field => { "service" => "school-management-system" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "sms-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
