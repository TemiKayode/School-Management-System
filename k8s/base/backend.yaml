apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: schoolms
data:
  NODE_ENV: production
  PORT: '5000'
  DATABASE_URL: postgresql://sms_user:sms_pass@postgres:5432/school_db?schema=public
  REDIS_URL: redis://redis:6379
  FRONTEND_URL: http://frontend:3000
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: schoolms
type: Opaque
stringData:
  JWT_SECRET: change-me-in-production-min-32-chars-random
  REFRESH_TOKEN_SECRET: change-me-refresh-secret-min-32-chars
  SENTRY_DSN: https://e9d7f4e9cb499dc2deef143e72397065@o4509921943158784.ingest.us.sentry.io/4511285682241536
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: schoolms
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: schoolms/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: schoolms
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: schoolms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
